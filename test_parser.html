<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>解析器测试</title></head>
<body><pre id="out"></pre>
<script>
// ===== COPY OF CURRENT PARSING CODE =====
const ZODIAC_MAP = {
  马:["01","13","25","37","49"],蛇:["02","14","26","38"],龙:["03","15","27","39"],
  兔:["04","16","28","40"],虎:["05","17","29","41"],牛:["06","18","30","42"],
  鼠:["07","19","31","43"],猪:["08","20","32","44"],狗:["09","21","33","45"],
  鸡:["10","22","34","46"],猴:["11","23","35","47"],羊:["12","24","36","48"]
};
const ALL_ZODIACS = ["马","蛇","龙","兔","虎","牛","鼠","猪","狗","鸡","猴","羊"];
const ZODIAC_CHARS = ALL_ZODIACS.join('');

const CN = {
  一:1,二:2,三:3,四:4,五:5,六:6,七:7,八:8,九:9,十:10,
  十一:11,十二:12,十三:13,十四:14,十五:15,十六:16,十七:17,十八:18,十九:19,
  二十:20,廿:20,廿一:21,廿二:22,廿三:23,廿四:24,廿五:25,廿六:26,廿七:27,廿八:28,廿九:29,
  三十:30,卅:30,卅一:31,卅二:32,卅三:33,卅四:34,卅五:35,卅六:36,卅七:37,卅八:38,卅九:39,
  四十:40,四十一:41,四十二:42,四十三:43,四十四:44,四十五:45,四十六:46,四十七:47,四十八:48,四十九:49,
  五十:50
};
const CNK = Object.keys(CN).sort((a,b)=>b.length-a.length);
function cn(s){ for(let k of CNK) if(s===k||s.startsWith(k)) return CN[k]; return 0; }
function parseCNNum(s){
  if(CN[s]) return CN[s];
  let total=0, tmp=0;
  const units={千:1000,百:100,十:10};
  for(const c of s){
    if(c in units){ tmp=(tmp||1)*units[c]; total+=tmp; tmp=0; }
    else if(c==='零') continue;
    else { const v=CN[c]; if(v) tmp=v; else return 0; }
  }
  return total+tmp;
}
function isHK(r){ return /香港|香\s*[:：]/.test(r); }
function stripSender(s){ return s.replace(/^[A-Za-z一-龥]{1,10}\s*[：:]\s*/,'').trim(); }
function stripMacau(s){ return s.replace(/^(?:新澳门|新奥|新澳|澳门|澳門|澳特|澳)\s*[:：]?\s*/i,'').replace(/^[：:,，\s]+/,'').trim(); }
function expandDot(s){ return s.replace(/(\d{1,2})\.(?=\d{1,2})/g,'$1 '); }
function norm(s){
  return s.replace(/[+＋]/g,'').replace(/。/g,'')
    .replace(/个数十斤/g,'各数10斤').replace(/个数十米/g,'各数10米')
    .replace(/一个号各/g,'各').replace(/一个号/g,'').replace(/个号/g,'各号').replace(/=个/g,'各')
    .replace(/[：∶]/g,'').replace(/各\//g,'各').replace(/(\d{1,2})各\//g,'$1各')
    .replace(/(?<!各)数十斤/g,'各10斤').replace(/(?<!各)数十米/g,'各10米')
    .replace(/平特\s*一肖/g,'平特')
    .replace(/平特[—\-－—]+/g,'平特')
    .replace(/\s+(各)/g,'$1').replace(/(各)\s+/g,'$1').replace(/\s+/g,' ').trim();
}
function clean(s){ return s.replace(/^[、，,\s\-－—]+/,'').replace(/[、，,。.\s\-－—]+$/,'').replace(/[。]/g,'').trim(); }

const KW = '(?:各数|个数|各号|号|个|各)';

function splitBets(seg){
  const ends = new Set();
  const ps = [
    new RegExp(`\\s*${KW}\\s*(?:[\\u4e00-\\u9fa5]+|\\d+(?:\\.\\d+)?)\\s*(?:斤|米|块)?`,'gi'),
    new RegExp(`(?:二连|三连)\\s*平?\\s*[${ZODIAC_CHARS}]+\\s*\\d+(?:\\.\\d+)?\\s*(?:斤|米|块)?`,'gi'),
    new RegExp(`[${ZODIAC_CHARS}]+(?:二连|三连)\\s*\\d+(?:\\.\\d+)?\\s*(?:斤|米|块)?`,'g'),
    new RegExp(`(?:平特[，,\\s]*[${ZODIAC_CHARS}]+|平[${ZODIAC_CHARS}])\\s*[，,]?\\s*\\d+\\s*(?:斤|米|块)?`,'g'),
    new RegExp(`\\d{1,2}\\s+[一二三四五六七八九十百千万廿卅两百]+\\s*(?:斤|米|块)`,'gi')
  ];
  ps.forEach(re=>{ let m; const r=new RegExp(re.source,re.flags); while((m=r.exec(seg))!==null) ends.add(m.index+m[0].length); });
  const sorted=[...ends].sort((a,b)=>a-b);
  if(!sorted.length) return [seg.trim()].filter(Boolean);
  const parts=[]; let start=0;
  sorted.forEach(end=>{ const p=seg.slice(start,end).trim(); if(p) parts.push(p); start=end; });
  const tail=seg.slice(start).trim(); if(tail) parts.push(tail);
  return parts.length?parts:[seg.trim()];
}

function expandDashGe(l){
  const re=/(\d{1,2})\s*[—\-－~～]+\s*各\s*[—\-－~～]+\s*(\d+(?:\.\d+)?)\s*(?:斤|米|块)?/gi;
  const parts=[]; let m;
  while((m=re.exec(l))!==null){ const n=parseInt(m[1]); if(n>=1&&n<=49) parts.push(`${n}各${m[2]}`); }
  if(!parts.length) return null;
  const rest=l.replace(re,'').replace(/[梧影\s：:，,、]+/g,'').trim();
  return rest.length<3?parts:null;
}

function expandLine(l){
  const s=norm(stripMacau(stripSender(l)));
  const dr=expandDashGe(s);
  if(dr){ return dr.map(d=>{ const c=clean(d); return c||null; }).filter(Boolean); }
  if(s.includes('平特')){
    const parts=[]; let idx=s.indexOf('平特'), prev=idx;
    while((idx=s.indexOf('平特',prev+2))!==-1){ parts.push(s.slice(prev,idx).trim()); prev=idx; }
    parts.push(s.slice(prev).trim());
    if(parts.length>1){
      const all=[]; parts.forEach(p=>{ splitBets(p).forEach(sp=>{ const c=clean(sp); if(c) all.push(c); }); });
      return all;
    }
  }
  return splitBets(s).map(p=>{ const c=clean(p); return c||null; }).filter(Boolean);
}

function getVal(txt){
  const n=norm(txt);
  let m=n.match(new RegExp(`\\s*${KW}\\s*(\\d+(?:\\.\\d+)?)\\s*(?:斤|米|块)?\\s*$`));
  if(m) return parseFloat(m[1]);
  m=n.match(new RegExp(`\\s*${KW}\\s*([\\u4e00-\\u9fa5]+)\\s*(?:斤|米|块)?\\s*$`));
  if(m){ const v=cn(m[1])||parseCNNum(m[1]); if(v>0) return v; }
  if(!/各/.test(n)){
    m=n.match(/(\d+(?:\.\d+)?)\s*(?:斤|米|块)?\s*$/);
    if(m){ const b=n.slice(0,m.index).trim(); if(b.length>0) return parseFloat(m[1]); }
    m=n.match(/^(.+?)([一二三四五六七八九十百千万廿卅两]+)\s*(?:斤|米|块)?\s*$/);
    if(m){ const v=cn(m[2])||parseCNNum(m[2]); if(v>0) return v; }
    m=n.match(/^(.+)\s+[一-龥]+\s*(?:斤|米|块)?\s*$/);
    if(m){ const v=cn(m[2])||parseCNNum(m[2]); if(v>0) return v; }
  }
  return 0;
}

function getList(txt){
  const n=norm(txt);
  const stripKw=s=>s.replace(/[\s个各号]+$/g,'').trim();
  let m=n.match(new RegExp(`\\s*${KW}\\s*(?:[\\u4e00-\\u9fa5]+|\\d+(?:\\.\\d+)?)\\s*(?:斤|米|块)?\\s*$`));
  if(m) return expandDot(stripKw(n.slice(0,m.index)));
  m=n.match(new RegExp(`\\s*${KW}\\s*(\\d+(?:\\.\\d+)?)\\s*(?:斤|米|块)?\\s*$`));
  if(m) return expandDot(stripKw(n.slice(0,m.index)));
  if(!/各/.test(n)){
    m=n.match(/(\d+(?:\.\d+)?)\s*(?:斤|米|块)?\s*$/);
    if(m){ const b=n.slice(0,m.index).trim(); if(b.length>0) return expandDot(b); }
    m=n.match(/^(.+?)([一二三四五六七八九十百千万廿卅两]+)\s*(?:斤|米|块)?\s*$/);
    if(m) return expandDot(m[1].trim());
    m=n.match(/^(.+)\s+[一-龥]+\s*(?:斤|米|块)?\s*$/);
    if(m) return expandDot(m[1].trim());
  }
  return expandDot(n.trim());
}

function splitItems(lp){
  const ex=expandDot(lp);
  const items=ex.split(/[.\/、,\s，\-－—]+/).filter(i=>i!=='');
  const fi=[];
  items.forEach(item=>{
    if(new RegExp(`^[${ZODIAC_CHARS}]+$`).test(item)){ for(let c of item) fi.push(c); }
    else { const parts=item.match(new RegExp(`[${ZODIAC_CHARS}]|\\d{1,2}`,'g')); if(parts) parts.forEach(p=>fi.push(p)); else fi.push(item); }
  });
  return fi;
}

function getTargets(items){
  const t=[];
  items.forEach(item=>{
    if(/^\d{1,2}$/.test(item)){ const n=parseInt(item); if(n>=1&&n<=49) t.push(n.toString().padStart(2,'0')); }
    else if(ZODIAC_MAP[item]) ZODIAC_MAP[item].forEach(n=>t.push(n));
  });
  return t;
}

function processRule(rawRule){
  const rule=clean(rawRule); if(!rule) return null;
  const hk=isHK(rule);
  const txt=norm(stripMacau(stripSender(rule)));
  const txtNoHK=txt.replace(/香港|香\s*[:：]/g,'').trim();

  const spm=txtNoHK.match(new RegExp(`^(大|小|单|双)\\s*${KW}\\s*([\\d\\u4e00-\\u9fa5]+)\\s*(?:斤|米|块)?\\s*$`));
  if(spm){
    const v=/^\d/.test(spm[2])?parseFloat(spm[2]):cn(spm[2])||parseCNNum(spm[2]);
    if(v){ return {display:`${hk?'香港':''}${spm[1]}各数${v}`, bet:v*49, type:'nums', targets:[]}; }
  }

  let cm=txtNoHK.match(new RegExp(`(?:二连|三连)\\s*平?\\s*([${ZODIAC_CHARS}]+)\\s*(\\d+(?:\\.\\d+)?)\\s*(?:斤|米|块)?`));
  if(!cm) cm=txtNoHK.match(new RegExp(`([${ZODIAC_CHARS}]+)(?:三连|二连)\\s*(\\d+(?:\\.\\d+)?)\\s*(?:斤|米|块)?`));
  if(cm){
    const zStr=cm[1], cv=parseFloat(cm[2]), ct=txtNoHK.includes('三连')?'triple':'double';
    const zs=zStr.split('');
    return {display:`${hk?'香港':''}${zStr}${ct==='triple'?'三连':'二连'} ${cv}`, bet:cv, type:'combo', comboZodiacs:zStr, comboType:ct};
  }

  let fm=txtNoHK.match(new RegExp(`^平特[，,\\s]*([${ZODIAC_CHARS}]+)\\s*[，,、]?\\s*(\\d+(?:\\.\\d+)?)\\s*(?:斤|米|块)?\\s*$`));
  if(!fm) fm=txtNoHK.match(new RegExp(`^平特[，,\\s]*([${ZODIAC_CHARS}]+)\\s*${KW}\\s*(\\d+(?:\\.\\d+)?)\\s*(?:斤|米|块)?\\s*$`));
  if(!fm) fm=txtNoHK.match(new RegExp(`^平特[，,\\s]*([${ZODIAC_CHARS}]+)\\s+(\\d+(?:\\.\\d+)?)\\s*(?:斤|米|块)?\\s*$`));
  if(fm){
    const zs=[...fm[1]], v=parseFloat(fm[2]);
    return {display:`${hk?'香港':''}平特${fm[1]} ${v}`, bet:v*zs.length, type:'flat', targets:zs};
  }

  const fms=txtNoHK.match(new RegExp(`^平([${ZODIAC_CHARS}])\\s*(\\d+)?`));
  if(fms){
    const z=fms[1], v=fms[2]?parseInt(fms[2]):getVal(txtNoHK);
    if(!v) return null;
    return {display:`${hk?'香港':''}平${z} ${v}`, bet:v, type:'flat', targets:[z]};
  }

  const icm=txtNoHK.match(new RegExp(`^([${ZODIAC_CHARS}]{2,3})\\s*(\\d+(?:\\.\\d+)?)\\s*(?:斤|米|块)?\\s*$`));
  if(icm){
    const zStr=icm[1], zv=parseFloat(icm[2]), ct=zStr.length===3?'triple':'double';
    return {display:`${hk?'香港':''}${zStr}${ct==='triple'?'三连':'二连'} ${zv}`, bet:zv, type:'combo', comboZodiacs:zStr, comboType:ct};
  }

  const value=getVal(txtNoHK); if(!value) return null;

  if(txtNoHK.includes('平特')){
    const zs=ALL_ZODIACS.filter(z=>txtNoHK.includes(z));
    if(zs.length>0){ return {display:`${hk?'香港':''}平特${zs.join('')} ${value}`, bet:value*zs.length, type:'flat', targets:zs}; }
    return null;
  }

  const lp=getList(txtNoHK), items=splitItems(lp), targets=getTargets(items);
  if(!targets.length) return null;
  return {display:`${hk?'香港':''}${targets.join('.')} 各${value}(${targets.length}码)`, bet:value*targets.length, type:'nums', targets};
}

// ===== TEST CASES =====
const testCases = [
  // Bug 1
  "新奥05.17.41各10",
  // Bug 2
  "新奥29二十块",
  // Bug 3
  "平虎50斤 二连平虎狗50斤、",
  // Bug 4
  "06各/10",
  // Bug 5
  "猴，龙，狗各号5",
  // Bug 6
  "02号30米",
  // Bug 7
  "49 十斤。",
  // Bug 8
  "牛鸡马虎各数十米 09-23各十米",
  // Bug 9
  "兔猪龙一个号各3，",
  // Bug 10
  "44=个5",
  // Bug 11
  "3.4.10.11.12.16.21.22.23.28.30.33.35.40.42.47各：4米",
  // Bug 12: 混合独立中文金额和分组金额
  "30 五十斤 01 28 29,30,31,32,36,40,48各数十斤",
  // Bug 13: 生肖+独立数字金额
  "鸡 各数5斤 10 50斤",
  // Bug 14: standalone CN value without KW
  "01 三十米 02 03各5斤",
  // Bug 15: "个数十斤" normalization
  "13.23.27.31.39.41.43.07 08.12.18.22.28.38.46.48个数十斤",
  // Bug 16: "平特一肖" normalization
  "平特一肖猪，6000 平特一肖狗，2000 平特一肖羊、2200",
];

let output = [];

testCases.forEach((raw, idx) => {
  output.push(`\n=== TEST ${idx+1}: "${raw}" ===`);

  // Step 1: strip and norm
  const afterStrip = stripMacau(stripSender(raw));
  output.push(`  1) After stripMacau/stripSender: "${afterStrip}"`);

  const afterNorm = norm(afterStrip);
  output.push(`  2) After norm: "${afterNorm}"`);

  // Step 2: expandDot
  const afterExpandDot = expandDot(afterNorm);
  output.push(`  3) After expandDot: "${afterExpandDot}"`);

  // Step 3: splitBets
  const parts = splitBets(afterNorm);
  output.push(`  4) splitBets parts: [${parts.map(p=>`"${p}"`).join(', ')}]`);

  // Step 4: expandLine
  const lines = expandLine(raw);
  output.push(`  5) expandLine: [${lines.map(l=>`"${l}"`).join(', ')}]`);

  // Step 5: processRule
  lines.forEach((line, li) => {
    const txt2 = norm(stripMacau(stripSender(line)));
    output.push(`  6-${li}) processRule input: "${txt2}"`);
    const val = getVal(txt2);
    output.push(`       getVal: ${val || '0 (未识别!)'}`);
    const list = getList(txt2);
    output.push(`       getList: "${list}"`);
    if(list) {
      const items = splitItems(list);
      output.push(`       splitItems: [${items.join(', ')}]`);
      const targets = getTargets(items);
      output.push(`       getTargets: [${targets.join(', ')}]`);
    }
    const rule = processRule(line);
    if(rule) {
      output.push(`       RESULT: display="${rule.display}" bet=${rule.bet} type=${rule.type} targets=${JSON.stringify(rule.targets)}`);
    } else {
      output.push(`       RESULT: null (未解析!)`);
    }
  });
});

document.getElementById('out').textContent = output.join('\n');
</script>
</body>
</html>
